<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Propuestas — Pliegos tipo vías</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;background:#f4f5f7;color:#1a1a2e}
.header{background:#fff;border-bottom:1px solid #e0e0e0;padding:0 1.5rem}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:1rem;padding:.7rem 0;flex-wrap:wrap}
.logo{font-size:15px;font-weight:600;color:#185fa5}
.pill{font-size:11px;color:#888;background:#f0f6ff;padding:2px 9px;border-radius:20px;border:1px solid #b5d4f4}
.nav{display:flex;gap:0;margin-left:1.5rem}
.ntab{padding:7px 16px;border:none;background:none;cursor:pointer;font-size:13px;color:#666;border-bottom:2px solid transparent;font-family:inherit;transition:all .15s}
.ntab.act{color:#185fa5;border-bottom-color:#185fa5;font-weight:500}
.main{max-width:1100px;margin:1.5rem auto;padding:0 1rem}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:1.25rem;margin-bottom:.9rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ctitle{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.9rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.full{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;color:#555;font-weight:500}
.field input,.field select,.field textarea{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid #d0d0d0;border-radius:7px;background:#fff;color:#1a1a2e;outline:none;transition:border .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#185fa5;box-shadow:0 0 0 3px rgba(24,95,165,.1)}
.field textarea{resize:vertical;min-height:60px}
.btn{padding:7px 15px;font-size:13px;font-weight:500;cursor:pointer;background:#fff;border:1px solid #ccc;border-radius:8px;color:#1a1a2e;font-family:inherit;transition:all .15s}
.btn:hover{background:#f5f7fa}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-primary{background:#185fa5;color:#fff;border-color:#185fa5}
.btn-primary:hover{background:#0f4a87}
.btn-success{background:#3b6d11;color:#fff;border-color:#3b6d11}
.btn-danger{color:#a32d2d;border-color:#e24b4a}
.btn-danger:hover{background:#fcebeb}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sec-title{font-size:17px;font-weight:600;margin-bottom:3px}
.sec-sub{font-size:13px;color:#888;margin-bottom:1.2rem}
.emp-card{border:1px solid #e0e0e0;border-radius:8px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;background:#fff;transition:all .15s;cursor:pointer}
.emp-card:hover{border-color:#185fa5;box-shadow:0 2px 8px rgba(24,95,165,.1)}
.emp-card.sel{border-color:#185fa5;background:#f0f6ff}
.emp-name{font-size:14px;font-weight:600;margin-bottom:2px}
.emp-sub{font-size:12px;color:#888}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;margin-right:3px}
.b-blue{background:#e6f1fb;color:#185fa5}
.b-green{background:#eaf3de;color:#3b6d11}
.b-warn{background:#faeeda;color:#854f0b}
.b-red{background:#fcebeb;color:#a32d2d}
.b-pink{background:#fbeaf0;color:#993556}
.alerta-r{background:#fcebeb;border:1px solid #f09595;border-radius:7px;padding:7px 11px;font-size:12px;color:#a32d2d;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.alerta-y{background:#faeeda;border:1px solid #ef9f27;border-radius:7px;padding:7px 11px;font-size:12px;color:#854f0b;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.alerta-g{background:#eaf3de;border:1px solid #97c459;border-radius:7px;padding:7px 11px;font-size:12px;color:#3b6d11;margin-bottom:5px}
.tag{display:inline-block;font-size:11px;padding:2px 7px;border-radius:5px;background:#f0f0f0;color:#666;margin-right:3px;margin-top:2px}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,0,0,.12);border-top-color:#185fa5;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:2.5rem;color:#999;font-size:13px;line-height:1.7}
.upload-box{border:2px dashed #d0d0d0;border-radius:8px;padding:1rem;text-align:center;cursor:pointer;transition:all .15s;position:relative;background:#fafafa}
.upload-box:hover{border-color:#185fa5;background:#f7fbff}
.upload-box input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-box p{font-size:12px;color:#999;margin-top:4px}
.doc-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border:1px solid #e0e0e0;border-radius:6px;margin-bottom:5px;font-size:12px;background:#fafafa}
.doc-item a{color:#185fa5;text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-item a:hover{text-decoration:underline}
.doc-venc-r{color:#a32d2d;font-size:11px;font-weight:500}
.doc-venc-y{color:#854f0b;font-size:11px;font-weight:500}
.doc-venc-g{color:#3b6d11;font-size:11px}
.upload-status{font-size:12px;margin-top:5px;padding:5px 8px;border-radius:5px}
.upload-ok{background:#eaf3de;color:#3b6d11}
.upload-err{background:#fcebeb;color:#a32d2d}
.upload-loading{color:#666}
.indicador{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px}
.ind-ok{color:#3b6d11;font-weight:500}
.ind-fail{color:#a32d2d;font-weight:500}
.ind-na{color:#aaa}
.fmt-chip{display:inline-block;padding:3px 9px;border-radius:6px;font-size:12px;font-weight:500;background:#e6f1fb;color:#185fa5;margin:2px}
.fmt-chip.hab{background:#eaf3de;color:#3b6d11}
.fmt-chip.otro{background:#f0f0f0;color:#666}
.chk-label{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:4px 0}
.exp-item{border:1px solid #e0e0e0;border-radius:7px;padding:10px;margin-bottom:7px}
.pct-ok{background:#eaf3de;color:#3b6d11;padding:3px 8px;border-radius:5px;font-size:12px;font-weight:500}
.pct-err{background:#fcebeb;color:#a32d2d;padding:3px 8px;border-radius:5px;font-size:12px;font-weight:500}
.f9-preview{background:#f7fbff;border:1px solid #b5d4f4;border-radius:8px;padding:1rem;margin-top:.75rem}
.sep{border:none;border-top:1px solid #f0f0f0;margin:.75rem 0}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="logo">Propuestas</div>
    <div class="pill">Res. 465/2024 · V4</div>
    <div class="nav">
      <button class="ntab act" onclick="goTab('empresas',this)">Base de datos</button>
      <button class="ntab" onclick="goTab('proceso',this)">Nuevo proceso</button>
      <button class="ntab" onclick="goTab('verificar',this)">Verificar y generar</button>
    </div>
  </div>
</div>
<div class="main">
  <div id="tab-empresas"></div>
  <div id="tab-proceso" style="display:none"></div>
  <div id="tab-verificar" style="display:none"></div>
</div>

<script>
let ST = {
  empresas: [],
  pliego: null,
  prop: { tipo:'individual', participantes:[], nombre_plural:'', obj_plural:'', dur_plural:'', rep_plural:'', cc_rep_plural:'', rep_suplente:'', cc_suplente:'' },
  verificacion: null,
  expSel: [],
  f9Config: {},
  docsIngenieroUrls: []
};

function goTab(name, btn){
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('act'));
  if(btn) btn.classList.add('act');
  ['empresas','proceso','verificar'].forEach(t=>{ document.getElementById('tab-'+t).style.display=t===name?'block':'none'; });
  if(name==='empresas') renderEmpresas();
  if(name==='proceso') renderProceso();
  if(name==='verificar') renderVerificar();
}

async function api(url, opts={}){ const r=await fetch(url,{headers:{'Content-Type':'application/json'},...opts}); return r.json(); }
async function cargarEmpresas(){ ST.empresas = await api('/api/empresas'); }

function diasStr(fv){
  if(!fv) return '';
  try{
    const d = Math.round((new Date(fv)-new Date())/(1000*60*60*24));
    if(d<0) return `<span class="doc-venc-r">VENCIDO hace ${Math.abs(d)} días</span>`;
    if(d<=30) return `<span class="doc-venc-y">Vence en ${d} días</span>`;
    return `<span class="doc-venc-g">Vigente (${d} días)</span>`;
  }catch{ return ''; }
}

// ══════════════════════════════════════════════════════════════════════════════
// TAB EMPRESAS
// ══════════════════════════════════════════════════════════════════════════════
async function renderEmpresas(){
  await cargarEmpresas();
  const el = document.getElementById('tab-empresas');
  el.innerHTML = `
    <div class="row" style="margin-bottom:1rem">
      <div><div class="sec-title">Base de datos de empresas</div><div class="sec-sub">Registra empresas con documentos e historial de experiencia</div></div>
      <div style="flex:1"></div>
      <button class="btn btn-primary" onclick="formEmpresa(null)">+ Nueva empresa</button>
    </div>
    <div id="lista-emp"></div>`;
  renderLista();
}

function renderLista(){
  const el = document.getElementById('lista-emp');
  if(!el) return;
  if(!ST.empresas.length){ el.innerHTML=`<div class="empty">No hay empresas. Agrega la primera.</div>`; return; }
  el.innerHTML = ST.empresas.map(e=>`
    <div class="emp-card" onclick="formEmpresa(${e.id})">
      <div style="flex:1">
        <div class="emp-name">${e.razon_social||'Sin nombre'}
          ${(e.alertas||[]).map(a=>`<span class="badge b-${a.nivel==='rojo'?'red':'warn'}">⚠ ${a.tipo}</span>`).join('')}
        </div>
        <div class="emp-sub">NIT: ${e.nit||'—'} · ${e.tipo||'—'} · ${e.ciudad||'—'}</div>
        <div style="margin-top:3px">
          ${e.experiencia?.length?`<span class="tag">${e.experiencia.length} contratos</span>`:''}
          ${e.tiene_discapacidad?'<span class="tag" style="background:#e6f1fb;color:#185fa5">Discapacidad</span>':''}
          ${e.tiene_mujeres?'<span class="tag" style="background:#fbeaf0;color:#993556">Mujeres</span>':''}
          ${e.es_mipyme?'<span class="tag" style="background:#eaf3de;color:#3b6d11">Mipyme</span>':''}
          ${e.rep_es_ingeniero?'<span class="tag" style="background:#faeeda;color:#854f0b">Ing. ✓</span>':''}
        </div>
      </div>
      <div class="row" onclick="event.stopPropagation()">
        <button class="btn btn-sm" onclick="formEmpresa(${e.id})">Editar</button>
        <button class="btn btn-sm btn-danger" onclick="eliminarEmp(${e.id})">Eliminar</button>
      </div>
    </div>`).join('');
}

function formEmpresa(id){
  const e = id ? (ST.empresas.find(x=>x.id===id)||{}) : {};
  const el = document.getElementById('tab-empresas');
  el.innerHTML = `
    <div class="row" style="margin-bottom:1rem">
      <div class="sec-title">${id?'Editar empresa':'Nueva empresa'}</div>
      <div style="flex:1"></div>
      <button class="btn" onclick="renderEmpresas()">← Cancelar</button>
      <button class="btn btn-primary" onclick="guardarEmp(${id||'null'})">Guardar</button>
    </div>

    <div class="card">
      <div class="ctitle">Datos básicos</div>
      <div class="g2">
        <div class="field full"><label>Razón social</label><input id="f-rs" value="${e.razon_social||''}"></div>
        <div class="field"><label>NIT</label><input id="f-nit" value="${e.nit||''}"></div>
        <div class="field"><label>Tipo</label>
          <select id="f-tipo">${['S.A.S.','S.A.','Ltda.','E.U.','Persona Natural','Cooperativa'].map(t=>`<option${e.tipo===t?' selected':''}>${t}</option>`).join('')}</select>
        </div>
        <div class="field"><label>Dirección</label><input id="f-dir" value="${e.direccion||''}"></div>
        <div class="field"><label>Ciudad</label><input id="f-ciudad" value="${e.ciudad||''}"></div>
        <div class="field"><label>Teléfono</label><input id="f-tel" value="${e.telefono||''}"></div>
        <div class="field"><label>Email</label><input id="f-email" value="${e.email||''}"></div>
        <div class="field"><label>Representante legal</label><input id="f-rep" value="${e.rep_legal||''}"></div>
        <div class="field"><label>CC representante legal</label><input id="f-cc" value="${e.cc_rep_legal||''}"></div>
        <div class="field"><label>Fecha constitución</label><input id="f-fcons" type="date" value="${e.fecha_constitucion||''}"></div>
        <div class="full">
          <label class="chk-label"><input type="checkbox" id="f-ing" ${e.rep_es_ingeniero?'checked':''} onchange="toggleIng(this.checked)">
            El representante legal es ingeniero</label>
          <div id="ing-mat" style="${e.rep_es_ingeniero?'':'display:none'};margin-top:6px">
            <div class="field"><label>Matrícula profesional</label><input id="f-mat" value="${e.rep_matricula||''}"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="ctitle">Cámara de comercio y RUP</div>
      <div class="g2">
        <div>
          <div style="font-size:12px;color:#555;font-weight:500;margin-bottom:5px">Cámara de comercio (PDF)</div>
          <div class="upload-box" style="padding:.75rem">
            <input type="file" accept=".pdf" onchange="subirDoc(${id||'null'},'camara',this,'camara-status',true)">
            <p>Sube el PDF — la IA extrae los datos automáticamente<br>Vigencia: 30 días desde expedición</p>
          </div>
          <div id="camara-status"></div>
          ${id && e.fecha_vencimiento_camara?`<div style="font-size:12px;margin-top:4px">Vencimiento actual: ${diasStr(e.fecha_vencimiento_camara)}</div>`:''}
          ${renderDocsSeccion(e.documentos||[], 'camara', id)}
        </div>
        <div>
          <div style="font-size:12px;color:#555;font-weight:500;margin-bottom:5px">RUP (PDF)</div>
          <div class="upload-box" style="padding:.75rem">
            <input type="file" accept=".pdf" onchange="subirDoc(${id||'null'},'rup',this,'rup-status',true)">
            <p>Sube el PDF — extrae indicadores financieros automáticamente<br>Vigencia: 30 días desde expedición</p>
          </div>
          <div id="rup-status"></div>
          ${id && e.fecha_vencimiento_rup?`<div style="font-size:12px;margin-top:4px">Vencimiento actual: ${diasStr(e.fecha_vencimiento_rup)}</div>`:''}
          ${renderDocsSeccion(e.documentos||[], 'rup', id)}
        </div>
        <div>
          <div style="font-size:12px;color:#555;font-weight:500;margin-bottom:5px">RUT (PDF)</div>
          <div class="upload-box" style="padding:.75rem">
            <input type="file" accept=".pdf" onchange="subirDoc(${id||'null'},'rut',this,'rut-status',true)">
            <p>Sube el PDF &#8212; la IA extrae datos</p>
          </div>
          <div id="rut-status"></div>
          ${renderDocsSeccion(e.documentos||[], 'rut', id)}
        </div>
        <div>
          <div style="font-size:12px;color:#555;font-weight:500;margin-bottom:5px">Cédula representante legal (PDF)</div>
          <div class="upload-box" style="padding:.75rem">
            <input type="file" accept=".pdf" onchange="subirDoc(${id||'null'},'cedula',this,'cedula-status',true)">
            <p>Subir PDF</p>
          </div>
          <div id="cedula-status"></div>
          ${renderDocsSeccion(e.documentos||[], 'cedula', id)}
        </div>
        <div>
          <div style="font-size:12px;color:#555;font-weight:500;margin-bottom:5px">REDAM representante legal (PDF)</div>
          <div class="upload-box" style="padding:.75rem">
            <input type="file" accept=".pdf" onchange="subirDoc(${id||'null'},'redam',this,'redam-status',true)">
            <p>Subir PDF &#8212; verifica vigencia</p>
          </div>
          <div id="redam-status"></div>
          ${renderDocsSeccion(e.documentos||[], 'redam', id)}
        </div>
        <div>
          <div style="font-size:12px;color:#555;font-weight:500;margin-bottom:5px">Estados financieros (PDF)</div>
          <div class="upload-box" style="padding:.75rem">
            <input type="file" accept=".pdf,.xlsx" onchange="subirDoc(${id||'null'},'estados_financieros',this,'ef-status',true)">
            <p>Sube el PDF &#8212; extrae indicadores</p>
          </div>
          <div id="ef-status"></div>
          ${renderDocsSeccion(e.documentos||[], 'estados_financieros', id)}
        </div>
        <div>
          <div style="font-size:12px;color:#555;font-weight:500;margin-bottom:5px">Formato 5 &#8212; Capacidad residual (PDF)</div>
          <div class="upload-box" style="padding:.75rem">
            <input type="file" accept=".pdf,.docx" onchange="subirDoc(${id||'null'},'capacidad_residual',this,'cr-status',false)">
            <p>Subir ya diligenciado</p>
          </div>
          <div id="cr-status"></div>
          ${renderDocsSeccion(e.documentos||[], 'capacidad_residual', id)}
        </div>
      </div>
      ${e.rep_es_ingeniero ? `
      <div class="sep"></div>
      <div style="font-size:12px;font-weight:600;color:#854f0b;margin-bottom:.5rem">Documentos del representante legal ingeniero</div>
      <div class="g2">
        <div>
          <div style="font-size:12px;color:#555;font-weight:500;margin-bottom:5px">Tarjeta profesional COPNIA (PDF)</div>
          <div class="upload-box" style="padding:.75rem">
            <input type="file" accept=".pdf" onchange="subirDoc(${id||'null'},'matricula_rep',this,'mat-rep-status',true)">
            <p>Subir PDF &#8212; extrae matrícula y vigencia</p>
          </div>
          <div id="mat-rep-status"></div>
          ${renderDocsSeccion(e.documentos||[], 'matricula_rep', id)}
        </div>
        <div>
          <div style="font-size:12px;color:#555;font-weight:500;margin-bottom:5px">Certificado de vigencia COPNIA (PDF)</div>
          <div class="upload-box" style="padding:.75rem">
            <input type="file" accept=".pdf" onchange="subirDoc(${id||'null'},'cert_copnia',this,'cert-copnia-status',true)">
            <p>Subir PDF &#8212; verifica vigencia</p>
          </div>
          <div id="cert-copnia-status"></div>
          ${renderDocsSeccion(e.documentos||[], 'cert_copnia', id)}
        </div>
      </div>` : ''}
    </div>    </div>

    <div class="card">
      <div class="ctitle">Capacidad financiera (se llena automáticamente del RUP)</div>
      <div class="g2">
        <div class="field"><label>Capital de trabajo (COP)</label><input id="f-cap" value="${e.capital_trabajo||''}"></div>
        <div class="field"><label>Patrimonio neto (COP)</label><input id="f-pat" value="${e.patrimonio||''}"></div>
        <div class="field"><label>Índice de liquidez</label><input id="f-liq" value="${e.liquidez||''}"></div>
        <div class="field"><label>Índice de endeudamiento</label><input id="f-end" value="${e.endeudamiento||''}"></div>
        <div class="field"><label>Rentabilidad del patrimonio</label><input id="f-rent" value="${e.rentabilidad||''}"></div>
        <div class="field"><label>Rentabilidad del activo</label><input id="f-renta" value="${e.rentabilidad_activo||''}"></div>
      </div>
    </div>

    <div class="card">
      <div class="ctitle">Contador / Revisor fiscal / Contador independiente</div>
      <div class="g3">
        <div>
          <div style="font-size:12px;font-weight:600;color:#185fa5;margin-bottom:.5rem">Contador</div>
          <div class="field"><label>Nombre</label><input id="f-cont-n" value="${e.contador_nombre||''}"></div>
          <div class="field"><label>CC</label><input id="f-cont-cc" value="${e.contador_cc||''}"></div>
          <div class="field"><label>T.P.</label><input id="f-cont-tp" value="${e.contador_tp||''}"></div>
          <div style="margin-top:8px">
            ${['cedula_contador','tp_contador','cert_jcc_contador'].map(t=>`
            <div style="font-size:11px;color:#666;margin-bottom:3px">${t==='cedula_contador'?'Cédula':t==='tp_contador'?'Tarjeta profesional':'Cert. vigencia Junta Contadores'}</div>
            <div class="upload-box" style="padding:6px;margin-bottom:4px">
              <input type="file" accept=".pdf" onchange="subirDoc(${id||'null'},'${t}',this,'${t}-status',true)">
              <p style="font-size:11px">Subir PDF</p>
            </div>
            <div id="${t}-status"></div>
            ${renderDocsSeccion(e.documentos||[], t, id)}`).join('')}
          </div>
        </div>
        <div>
          <div style="font-size:12px;font-weight:600;color:#185fa5;margin-bottom:.5rem">Revisor fiscal (si aplica)</div>
          <div class="field"><label>Nombre</label><input id="f-rev-n" value="${e.revisor_nombre||''}"></div>
          <div class="field"><label>CC</label><input id="f-rev-cc" value="${e.revisor_cc||''}"></div>
          <div class="field"><label>T.P.</label><input id="f-rev-tp" value="${e.revisor_tp||''}"></div>
          <div style="margin-top:8px">
            ${['cedula_revisor','tp_revisor','cert_jcc_revisor'].map(t=>`
            <div style="font-size:11px;color:#666;margin-bottom:3px">${t==='cedula_revisor'?'Cédula':t==='tp_revisor'?'Tarjeta profesional':'Cert. vigencia Junta Contadores'}</div>
            <div class="upload-box" style="padding:6px;margin-bottom:4px">

function renderDocsSeccion(docs, tipo, empId, expId=null){
  const filtrados = docs.filter(d => expId ? d.experiencia_id===expId : d.tipo===tipo);
  if(!filtrados.length) return '';
  return `<div style="margin-top:5px">${filtrados.map(d=>`
    <div class="doc-item">
      <a href="${d.url_cloudinary}" target="_blank">📄 ${d.nombre_archivo}</a>
      ${d.fecha_vencimiento?diasStr(d.fecha_vencimiento):''}
      <button class="btn btn-sm btn-danger" style="padding:2px 7px;font-size:11px" onclick="eliminarDoc(${d.id})">✕</button>
    </div>`).join('')}</div>`;
}

function toggleIng(checked){ document.getElementById('ing-mat').style.display = checked?'block':'none'; }
function toggleSec(id, checked){ document.getElementById(id).style.display = checked?'block':'none'; }

async function guardarEmp(id){
  const data = {
    razon_social: document.getElementById('f-rs').value,
    nit: document.getElementById('f-nit').value,
    tipo: document.getElementById('f-tipo').value,
    direccion: document.getElementById('f-dir').value,
    ciudad: document.getElementById('f-ciudad').value,
    telefono: document.getElementById('f-tel').value,
    email: document.getElementById('f-email').value,
    rep_legal: document.getElementById('f-rep').value,
    cc_rep_legal: document.getElementById('f-cc').value,
    rep_es_ingeniero: document.getElementById('f-ing').checked?1:0,
    rep_matricula: document.getElementById('f-mat')?.value||'',
    fecha_constitucion: document.getElementById('f-fcons').value,
    contador_nombre: document.getElementById('f-cont-n').value,
    contador_cc: document.getElementById('f-cont-cc').value,
    contador_tp: document.getElementById('f-cont-tp').value,
    revisor_nombre: document.getElementById('f-rev-n').value,
    revisor_cc: document.getElementById('f-rev-cc').value,
    revisor_tp: document.getElementById('f-rev-tp').value,
    cont_ind_nombre: document.getElementById('f-ci-n').value,
    cont_ind_cc: document.getElementById('f-ci-cc').value,
    cont_ind_tp: document.getElementById('f-ci-tp').value,
    capital_trabajo: document.getElementById('f-cap').value,
    patrimonio: document.getElementById('f-pat').value,
    liquidez: document.getElementById('f-liq').value,
    endeudamiento: document.getElementById('f-end').value,
    rentabilidad: document.getElementById('f-rent').value,
    rentabilidad_activo: document.getElementById('f-renta').value,
    tiene_discapacidad: document.getElementById('f-disc').checked?1:0,
    tiene_mujeres: document.getElementById('f-muj').checked?1:0,
    es_mipyme: document.getElementById('f-mipyme').checked?1:0,
    exonerada_parafiscales: document.getElementById('f-exon').checked?1:0,
  };
  if(!data.razon_social){ alert('La razón social es obligatoria'); return; }
  if(id){ await api(`/api/empresas/${id}`, {method:'PUT', body:JSON.stringify(data)}); }
  else { const r = await api('/api/empresas', {method:'POST', body:JSON.stringify(data)}); id = r.id; }
  await renderEmpresas();
}

async function eliminarEmp(id){ if(!confirm('¿Eliminar esta empresa?')) return; await api(`/api/empresas/${id}`,{method:'DELETE'}); await renderEmpresas(); }

async function agregarExp(empId){
  if(!empId){ alert('Primero guarda la empresa'); return; }
  const data = {
    entidad: document.getElementById('exp-ent').value,
    objeto: document.getElementById('exp-obj').value,
    valor: document.getElementById('exp-val').value,
    fecha_inicio: document.getElementById('exp-fi').value,
    fecha_fin: document.getElementById('exp-ff').value,
    plazo: document.getElementById('exp-plazo').value,
    consecutivo_rup: document.getElementById('exp-rup').value,
    acta: document.getElementById('exp-acta').value,
  };
  if(!data.entidad||!data.objeto){ alert('Completa entidad y objeto'); return; }
  await api(`/api/empresas/${empId}/experiencia`, {method:'POST', body:JSON.stringify(data)});
  await cargarEmpresas();
  formEmpresa(empId);
}

async function eliminarExp(xid, empId){ await api(`/api/experiencia/${xid}`,{method:'DELETE'}); await cargarEmpresas(); formEmpresa(empId); }

async function eliminarDoc(docId){ if(!confirm('¿Eliminar este documento?')) return; await api(`/api/documentos/${docId}`,{method:'DELETE'}); location.reload(); }

async function subirDoc(empId, tipo, input, statusId, extraer=false, expId=null){
  if(!input.files[0]) return;
  if(!empId || empId==='null'){ alert('Primero guarda la empresa'); input.value=''; return; }
  const statusEl = document.getElementById(statusId);
  if(statusEl) statusEl.innerHTML = `<div class="upload-status upload-loading"><span class="spin"></span>Subiendo${extraer?' y extrayendo datos con IA':''}...</div>`;

  const form = new FormData();
  form.append('archivo', input.files[0]);
  form.append('tipo', tipo);
  form.append('empresa_id', empId);
  form.append('extraer', extraer.toString());
  if(expId) form.append('experiencia_id', expId);

  try {
    const r = await fetch('/api/subir-documento', {method:'POST', body:form});
    const res = await r.json();
    if(res.ok){
      let msg = '✓ Documento subido correctamente';
      if(res.fecha_vencimiento) msg += ` · ${diasStr(res.fecha_vencimiento)}`;
      if(extraer && res.datos_extraidos && !res.datos_extraidos.error){
        const campos = Object.entries(res.datos_extraidos).filter(([k,v])=>v&&k!=='error').slice(0,4);
        if(campos.length) msg += `<br>Datos extraídos: ${campos.map(([k,v])=>`${k}: ${v}`).join(' · ')}`;
        // Rellenar campos automáticamente según tipo de documento
        const d = res.datos_extraidos;
        const setV = (id,v) => { const el=document.getElementById(id); if(el&&v&&String(v)!=='YYYY-MM-DD') el.value=v; };
        const setChk = (id,v) => { const el=document.getElementById(id); if(el&&v) el.checked=true; };

        // Cámara de comercio y RUP — llenan datos básicos + indicadores + revisor
        if(['camara','rup'].includes(tipo)){
          setV('f-rs', d.razon_social); setV('f-nit', d.nit); setV('f-tipo', d.tipo_empresa);
          setV('f-dir', d.direccion); setV('f-ciudad', d.ciudad); setV('f-tel', d.telefono);
          setV('f-email', d.email); setV('f-rep', d.rep_legal); setV('f-cc', d.cc_rep_legal);
          setV('f-fcons', d.fecha_constitucion);
          // Revisor fiscal (si aparece en la cámara)
          setV('f-rev-n', d.revisor_nombre); setV('f-rev-cc', d.revisor_cc); setV('f-rev-tp', d.revisor_tp);
          // Indicadores financieros (principalmente del RUP)
          setV('f-liq', d.liquidez); setV('f-end', d.endeudamiento);
          setV('f-rent', d.rentabilidad); setV('f-renta', d.rentabilidad_activo);
          setV('f-cap', d.capital_trabajo); setV('f-pat', d.patrimonio);
          if(d.es_mipyme === true) setChk('f-mipyme', true);
        }
        // RUT — datos básicos
        else if(tipo === 'rut'){
          setV('f-rs', d.razon_social); setV('f-nit', d.nit);
          setV('f-dir', d.direccion); setV('f-ciudad', d.ciudad);
          setV('f-email', d.email); setV('f-tel', d.telefono);
          setV('f-fcons', d.fecha_constitucion);
        }
        // Estados financieros — indicadores + datos del contador que firma
        else if(tipo === 'estados_financieros'){
          setV('f-liq', d.liquidez); setV('f-end', d.endeudamiento);
          setV('f-rent', d.rentabilidad); setV('f-renta', d.rentabilidad_activo);
          setV('f-cap', d.capital_trabajo); setV('f-pat', d.patrimonio);
          // Si el documento tiene datos del contador que lo firma
          setV('f-cont-n', d.contador_nombre); setV('f-cont-cc', d.contador_cc);
          setV('f-cont-tp', d.contador_tp);
        }
        // Cédula contador
        else if(tipo === 'cedula_contador'){
          setV('f-cont-n', d.nombre_completo); setV('f-cont-cc', d.numero_cedula);
        }
        // Tarjeta profesional contador
        else if(tipo === 'tp_contador'){
          setV('f-cont-n', d.nombre_completo); setV('f-cont-tp', d.numero_tp);
        }
        // Certificado JCC contador
        else if(tipo === 'cert_jcc_contador'){
          setV('f-cont-n', d.nombre_completo); setV('f-cont-tp', d.numero_tp);
        }
        // Cédula revisor fiscal
        else if(tipo === 'cedula_revisor'){
          setV('f-rev-n', d.nombre_completo); setV('f-rev-cc', d.numero_cedula);
        }
        // Tarjeta profesional revisor
        else if(tipo === 'tp_revisor'){
          setV('f-rev-n', d.nombre_completo); setV('f-rev-tp', d.numero_tp);
        }
        // Certificado JCC revisor
        else if(tipo === 'cert_jcc_revisor'){
          setV('f-rev-n', d.nombre_completo); setV('f-rev-tp', d.numero_tp);
        }
        // Cédula contador independiente
        else if(tipo === 'cedula_cont_ind'){
          setV('f-ci-n', d.nombre_completo); setV('f-ci-cc', d.numero_cedula);
        }
        // Tarjeta profesional contador independiente
        else if(tipo === 'tp_cont_ind'){
          setV('f-ci-n', d.nombre_completo); setV('f-ci-tp', d.numero_tp);
        }
        // Certificado JCC contador independiente
        else if(tipo === 'cert_jcc_cont_ind'){
          setV('f-ci-n', d.nombre_completo); setV('f-ci-tp', d.numero_tp);
        }
        // Tarjeta profesional / matrícula del rep legal (COPNIA)
        else if(['matricula_rep','cert_copnia'].includes(tipo)){
          setV('f-mat', d.numero_matricula);
        }
      }
      if(statusEl) statusEl.innerHTML = `<div class="upload-status upload-ok">${msg}</div>`;
    } else {
      if(statusEl) statusEl.innerHTML = `<div class="upload-status upload-err">Error: ${res.error}</div>`;
    }
  } catch(e){
    if(statusEl) statusEl.innerHTML = `<div class="upload-status upload-err">Error de conexión</div>`;
  }
}

      </div>`:''}
    </div>

    <div class="row" style="justify-content:flex-end">
      <button class="btn btn-primary" onclick="irVerificar()">Continuar →</button>
    </div>`;
}

function setTipo(t){ ST.prop.tipo=t; ST.prop.participantes=[]; renderProceso(); }
function toggleEmp(id){
  const p=ST.prop; const sel=p.participantes.find(x=>x.id===id);
  if(p.tipo==='individual'){ p.participantes=[{id,pct:100}]; }
  else { if(sel) p.participantes=p.participantes.filter(x=>x.id!==id); else p.participantes.push({id,pct:0}); }
  renderProceso();
}
function setPct(id,v){ const p=ST.prop.participantes.find(x=>x.id===id); if(p) p.pct=parseFloat(v)||0; }

// Documentos ingeniero temporal (para este proceso, no se guardan)
async function subirDocIngenieroTemp(empId, tipo, input){
  if(!input.files[0]) return;
  const statusId = tipo==='tp_copnia'?`ing-tp-status-${empId}`:`ing-cert-status-${empId}`;
  const statusEl = document.getElementById(statusId);
  if(statusEl) statusEl.innerHTML = `<div class="upload-status upload-loading"><span class="spin"></span>Subiendo...</div>`;

  // Subir a Cloudinary via backend pero sin guardar en DB
  const form = new FormData();
  form.append('archivo', input.files[0]);
  form.append('tipo', `ing_${tipo}`);
  form.append('empresa_id', empId);
  form.append('extraer', 'false');

  try {
    const r = await fetch('/api/subir-documento', {method:'POST', body:form});
    const res = await r.json();
    if(res.ok){
      ST.docsIngenieroUrls.push({tipo, url: res.url, nombre: input.files[0].name});
      if(statusEl) statusEl.innerHTML = `<div class="upload-status upload-ok">✓ ${input.files[0].name}</div>`;
    }
  } catch(e){
    if(statusEl) statusEl.innerHTML = `<div class="upload-status upload-err">Error subiendo</div>`;
  }
}

async function analizarPliego(input){
  if(!input.files[0]) return;
  const statusEl = document.getElementById('pliego-status');
  const resEl = document.getElementById('pliego-res');
  statusEl.innerHTML = '<div class="upload-status upload-loading"><span class="spin"></span>Analizando el pliego con IA... (20-40 segundos)</div>';
  resEl.innerHTML = '';

  const form = new FormData();
  form.append('pliego', input.files[0]);
  try {
    const r = await fetch('/api/analizar-pliego', {method:'POST', body:form});
    const res = await r.json();
    if(res.ok){
      ST.pliego = res.pliego;
      const pl = res.pliego;
      const fp = pl.formatos_puntaje||{};
      statusEl.innerHTML = '<div class="upload-status upload-ok">✓ Pliego analizado correctamente</div>';
      resEl.innerHTML = `
        <div style="background:#f7fbff;border:1px solid #b5d4f4;border-radius:8px;padding:1rem;margin-top:.75rem">
          <div style="font-weight:600;font-size:14px;margin-bottom:4px">${pl.entidad||''} — ${pl.numero_proceso||''}</div>
          <div style="font-size:13px;color:#444;margin-bottom:4px">${pl.objeto||''}</div>
          <div style="font-size:12px;color:#666">Presupuesto: ${pl.presupuesto_oficial||'—'} · Plazo: ${pl.plazo_ejecucion||'—'} · Cierre: ${pl.fecha_cierre||'—'}</div>
          <div class="sep"></div>
          <div style="font-size:12px;font-weight:600;color:#3b6d11;margin-bottom:3px">Habilitantes:</div>
          <div><span class="fmt-chip hab">F1</span>${pl.formatos_puntaje?'<span class="fmt-chip hab">F6</span>':''}</div>
          <div style="font-size:12px;font-weight:600;color:#185fa5;margin:.6rem 0 3px">Puntaje (aplican en este proceso):</div>
          <div>${Object.entries(fp).filter(([k,v])=>v.aplica).map(([k,v])=>`<span class="fmt-chip">${k}${v.puntaje?' ('+v.puntaje+'pts)':''}</span>`).join('')||'<span style="font-size:12px;color:#888">Ninguno detectado</span>'}</div>
          ${Object.values(fp).some(v=>v.bienes_relevantes?.length)?`
          <div style="font-size:12px;font-weight:600;color:#666;margin:.6rem 0 3px">Bienes relevantes F9A:</div>
          <div style="font-size:12px">${fp.F9A?.bienes_relevantes?.join(', ')||''}</div>`:''}
          <div style="font-size:12px;font-weight:600;color:#666;margin:.6rem 0 3px">Indicadores mínimos requeridos:</div>
          <div style="font-size:12px">${Object.entries(pl.requisitos_habilitantes?.financieros||{}).filter(([k,v])=>v).map(([k,v])=>`${k}: ${v}`).join(' · ')||'No especificados'}</div>
        </div>`;
    } else {
      statusEl.innerHTML = `<div class="upload-status upload-err">Error: ${res.error}</div>`;
    }
  } catch(e){
    statusEl.innerHTML = `<div class="upload-status upload-err">Error analizando el pliego</div>`;
  }
}

async function irVerificar(){
  // Guardar datos plurales
  if(ST.prop.tipo!=='individual'){
    ST.prop.nombre_plural = document.getElementById('pp-nom')?.value||'';
    ST.prop.obj_plural = document.getElementById('pp-obj')?.value||'';
    ST.prop.dur_plural = document.getElementById('pp-dur')?.value||'';
    ST.prop.rep_plural = document.getElementById('pp-rep')?.value||'';
    ST.prop.cc_rep_plural = document.getElementById('pp-cc')?.value||'';
    ST.prop.rep_suplente = document.getElementById('pp-sup')?.value||'';
    ST.prop.cc_suplente = document.getElementById('pp-ccs')?.value||'';
  }
  if(!ST.pliego){ alert('Primero sube y analiza el pliego'); return; }
  if(!ST.prop.participantes.length){ alert('Selecciona al menos una empresa'); return; }
  if(ST.prop.tipo!=='individual'){
    const tot = ST.prop.participantes.reduce((s,x)=>s+(+x.pct||0),0);
    if(Math.round(tot)!==100){ alert(`Los porcentajes deben sumar 100%. Suma: ${tot.toFixed(1)}%`); return; }
  }
  document.querySelectorAll('.ntab')[2].click();
}

function toggleExp(id, checked){
  if(!ST.expSel) ST.expSel=[];
  if(checked) ST.expSel.push(id);
  else ST.expSel = ST.expSel.filter(x=>x!==id);
}

async function generarFormatos(){
  const btn = document.getElementById('btn-gen');
  const status = document.getElementById('gen-status');
  btn.disabled = true;

  const bEd = document.getElementById('bienes-edit');
  if(bEd) ST.f9Config.bienes_relevantes = bEd.value.split('\n').filter(x=>x.trim());

  // Recopilar datos de empresas completos
  const db = ST.empresas;
  const empresas_data = ST.prop.participantes.map(p=>{
    const e = db.find(x=>x.id===p.id)||{};
    return {...e, pct: p.pct};
  });

  // Recopilar experiencia seleccionada
  const exp_sel = [];
  for(const p of ST.prop.participantes){
    const emp = db.find(x=>x.id===p.id);
    if(emp?.experiencia){
      for(const x of emp.experiencia){
        if(ST.expSel?.includes(x.id)) exp_sel.push(x);
      }
    }
  }

  const meta = {
    nombre_plural: ST.prop.nombre_plural, obj_plural: ST.prop.obj_plural,
    dur_plural: ST.prop.dur_plural, rep_plural: ST.prop.rep_plural,
    cc_rep_plural: ST.prop.cc_rep_plural, rep_suplente: ST.prop.rep_suplente,
    cc_suplente: ST.prop.cc_suplente
  };

  const formatos = ST.verificacion?.formatos_a_generar || [];
  const nombres = {
    'F1':'Carta de presentación','F2':'Acta consorcio/UT','F6':'Seguridad social',
    'F7A':'Gerencia proyectos','F7B':'Maquinaria','F7C':'Plan calidad',
    'F8':'Discapacidad','F9A':'Industria nacional','F9B':'Comp. nacional',
    'F12':'Empresas mujeres','F13':'Mipyme','F14':'Ambiental y social',
    'ANX4':'Pacto transparencia','F10':'Desempate','F11':'Datos personales'
  };

  // Mostrar barra de progreso
  status.innerHTML = `
    <div style="background:#f7fbff;border:1px solid #b5d4f4;border-radius:8px;padding:1rem;margin-bottom:.75rem">
      <div style="font-size:13px;font-weight:500;margin-bottom:.75rem">Generando formatos con IA...</div>
      <div id="prog-lista">
        ${formatos.map(f=>`
        <div id="prog-${f}" style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;color:#888">
          <span id="icon-${f}" style="width:16px;text-align:center">○</span>
          ${nombres[f]||f}
        </div>`).join('')}
      </div>
    </div>`;

  const archivosGenerados = [];
  let errores = 0;

  for(const fid of formatos){
    const iconEl = document.getElementById(`icon-${fid}`);
    const rowEl = document.getElementById(`prog-${fid}`);
    if(iconEl){ iconEl.innerHTML = '<span class="spin"></span>'; rowEl.style.color='#1a1a2e'; }

    try {
      const body = {
        formato_id: fid,
        pliego: ST.pliego,
        empresas_data: empresas_data,
        tipo_proponente: ST.prop.tipo,
        meta: meta,
        f9_config: ST.f9Config,
        experiencia_sel: exp_sel
      };
      const r = await fetch('/api/generar-formato', {
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
      });
      if(r.ok){
        const blob = await r.blob();
        const cd = r.headers.get('Content-Disposition')||'';
        const match = cd.match(/filename="?([^"]+)"?/);
        const fname = match?.[1] || `${fid}.docx`;
        archivosGenerados.push({blob, nombre: fname, fid});
        if(iconEl){ iconEl.textContent='✓'; rowEl.style.color='#3b6d11'; }
      } else {
        errores++;
        if(iconEl){ iconEl.textContent='✗'; rowEl.style.color='#a32d2d'; }
      }
    } catch(e){
      errores++;
      if(iconEl){ iconEl.textContent='✗'; rowEl.style.color='#a32d2d'; }
    }
  }

  // Descargar cada Word individualmente
  if(archivosGenerados.length > 0){
    for(const arch of archivosGenerados){
      const url = URL.createObjectURL(arch.blob);
      const a = document.createElement('a');
      a.href=url; a.download=arch.nombre; a.click();
      await new Promise(r=>setTimeout(r,600));
    }
    status.innerHTML += `<div class="alerta-g">✓ ${archivosGenerados.length} formatos descargados en tu carpeta de descargas.${errores>0?` (${errores} con error)`:''}
      <br><button class="btn btn-sm" style="margin-top:6px" onclick="descargarDocs()">⬇ Descargar también los documentos soportes (ZIP)</button></div>`;
  } else {
    status.innerHTML += '<div class="alerta-r">Error generando los documentos. Intenta de nuevo.</div>';
  }

  btn.disabled=false;
  btn.innerHTML='⬇ Regenerar formatos';
}

async function descargarDocs(){
  const body = {
    empresas: ST.prop.participantes,
    experiencia_ids: ST.expSel||[],
    numero_proceso: ST.pliego?.numero_proceso||'proceso',
    docs_ingeniero: ST.docsIngenieroUrls||[]
  };
  try {
    const r = await fetch('/api/descargar-docs-zip',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href=url; a.download=`Documentos_${ST.pliego?.numero_proceso||'proceso'}.zip`; a.click();
    }
  } catch(e){ alert('Error descargando documentos'); }
}
